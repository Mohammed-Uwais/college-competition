<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>College Competition Registry</title>
    <link rel="stylesheet" href="style.css">
</head>
<body data-theme="dark">

    <!-- Header Navigation Panel -->
    <header>
        <div class="logo">CAMPUS<span>COMP</span></div>
    </header>

    <!-- User Input Registration Section -->
    <section id="registration" class="registration">
        <h2>Secure User Registry</h2>
        <p class="section-desc">Submit your parameters to log your profile instance directly into the cloud database.</p>
        
        <form id="userForm">
            <div class="input-group">
                <input type="text" id="username" placeholder=" " required>
                <label for="username">Username</label>
            </div>
            <div class="input-group">
                <input type="number" id="age" min="1" max="120" placeholder=" " required>
                <label for="age">Age</label>
            </div>
            <div class="input-group">
                <input type="tel" id="phone" placeholder=" " required>
                <label for="phone">Phone Number</label>
            </div>
            <div class="input-group">
                <input type="email" id="email" placeholder=" " required>
                <label for="email">Email ID</label>
            </div>
            <button type="submit" class="btn-submit">Commit Parameters</button>
        </form>
        
        <p id="formFeedback" class="hidden"></p>
    </section>

    <!-- Base Frame Footer -->
    <footer>
        <p>&copy; 2026 Campus Events. Engineered for high performance.</p>
    </footer>

    <script src="script.js"></script>
</body>
</html>
