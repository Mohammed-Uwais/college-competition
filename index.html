<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cyber Competition Portal</title>
    <link rel="stylesheet" href="style.css">
</head>
<body data-theme="dark">

    <!-- Matrix Ambient Background Vector Overlay -->
    <canvas id="matrix-canvas"></canvas>

    <!-- Header Navigation Shell -->
    <header>
        <div class="logo-container">
            <div class="logo glitch-text" data-text="KINGDOM:CORE">KINGDOM<span>:CORE</span></div>
        </div>
        <div class="system-status">
            <span class="pulse-node"></span> NETWORK LINK ACTIVE
        </div>
    </header>

    <!-- Core Interactive Interface Shell -->
    <main class="viewport-center">
        <section id="registration" class="registration-panel">
            <div class="panel-header">
                <h2 class="glow-title">AI DYNASTY</h2>
                <p class="section-desc">Authorize your lineage credentials to register your node directly into the AI Dynasty kingdom</p>
            </div>
            
            <form id="userForm">
                <div class="input-group">
                    <input type="text" id="username" placeholder=" " required autocomplete="off">
                    <label for="username">Bot Name</label>
                    <div class="bar"></div>
                </div>
                <div class="input-group">
                    <input type="number" id="age" min="15" max="99" placeholder=" " required autocomplete="off">
                    <label for="age">Age Metric</label>
                    <div class="bar"></div>
                </div>
                <div class="input-group">
                    <input type="tel" id="phone" placeholder=" " required autocomplete="off">
                    <label for="phone">Phone Line Comms</label>
                    <div class="bar"></div>
                </div>
                <div class="input-group">
                    <input type="email" id="email" placeholder=" " required autocomplete="off">
                    <label for="email">Email Terminal Gateway</label>
                    <div class="bar"></div>
                </div>
                <button type="submit" class="btn-submit magnetic-element">
                    <span class="btn-text">DONE...</span>
                    <span class="btn-glitch-layer"></span>
                </button>
            </form>
            
            <div id="formFeedback" class="feedback-banner hidden"></div>
        </section>
    </main>

    <!-- Global Base Footer -->
    <footer>
        <div class="footer-grid">
            <p>&copy; 2026 KINGDOM CORE INFRASTRUCTURE. OPERATING SYSTEM VER 2.26</p>
        </div>
    </footer>

    <script src="script.js"></script>
</body>
</html>
